<h1>environment Dictation</h1>

<p id="progress">1 / 3</p>

<button onclick="playAudio()">🔊 Play Audio</button>

<br><br>

<input id="answer" placeholder="Type the word here">

<br><br>

<button onclick="checkAnswer()">Check</button>

<p id="result"></p>

<button onclick="nextWord()">Next</button>

<script>
const words = [
  {
    word: "habitat",
    meaning: "栖息地"
  },
  {
    word: "biodiversity",
    meaning: "生物多样性"
  },
  {
    word: "sustainable development",
    meaning: "可持续发展"
  }
];

let current = 0;

function playAudio() {
  const utterance = new SpeechSynthesisUtterance(words[current].word);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

function checkAnswer() {
  const userAnswer = document.getElementById("answer").value.trim().toLowerCase();
  const correctAnswer = words[current].word.toLowerCase();

  if (userAnswer === correctAnswer) {
    document.getElementById("result").innerHTML =
      "✅ Correct!<br>" + words[current].word + " = " + words[current].meaning;
  } else {
    document.getElementById("result").innerHTML =
      "❌ Try again.<br>Correct answer: " + words[current].word + "<br>Meaning: " + words[current].meaning;
  }
}

function nextWord() {
  current++;

  if (current >= words.length) {
    document.getElementById("result").innerHTML = "🎉 Finished!";
    return;
  }

  document.getElementById("answer").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("progress").innerHTML = (current + 1) + " / " + words.length;

  playAudio();
}
</script>
